  /* dark overlay */
  body::after{
    content:'';
    position:fixed;inset:0;
    background:radial-gradient(ellipse at center,rgba(13,13,13,.55) 0%,rgba(13,13,13,.85) 100%);
    pointer-events:none;
    z-index:0;
  }

  .wrap{
    width:100%;max-width:420px;
    position:relative;z-index:1;
    animation:fadeUp .5s ease both;
  }

  @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

  .logo{
    text-align:center;
    margin-bottom:36px;
  }

  .logo h1{font-size:20px;font-weight:700;letter-spacing:-.3px;}
  .logo p{font-size:13px;color:var(--sub);margin-top:4px;}

  .cards{display:flex;flex-direction:column;gap:12px;}

  .access-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px 22px;
    cursor:pointer;
    display:flex;align-items:center;gap:16px;
    transition:border-color .2s,transform .15s,box-shadow .2s;
    text-decoration:none;
    color:inherit;
  }
  .access-card:hover{
    border-color:rgba(255,255,255,.15);
    transform:translateY(-2px);
    box-shadow:0 8px 32px rgba(0,0,0,.4);
  }
  .access-card.sup:hover{border-color:var(--orange);}
  .access-card.col:hover{border-color:var(--green);}

  .card-icon{
    width:46px;height:46px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;flex-shrink:0;
  }
  .sup .card-icon{background:rgba(234,88,12,.12);}
  .col .card-icon{background:rgba(29,158,117,.12);}

  .card-text h2{font-size:15px;font-weight:600;margin-bottom:3px;}
  .card-text p{font-size:12px;color:var(--sub);line-height:1.4;}
  .card-arrow{margin-left:auto;color:var(--sub);font-size:18px;flex-shrink:0;}

  /* login modal */
  .overlay{
    display:none;
    position:fixed;inset:0;
    background:rgba(0,0,0,.75);
    backdrop-filter:blur(4px);
    z-index:100;
    align-items:center;justify-content:center;
    padding:24px;
    animation:fadeIn .2s ease both;
  }
  .overlay.open{display:flex;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

  .modal{
    background:#1a1a1a;
    border:1px solid var(--border);
    border-radius:20px;
    padding:28px 28px 24px;
    width:100%;max-width:360px;
    animation:scaleIn .2s ease both;
  }
  @keyframes scaleIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}

  .modal h2{font-size:18px;font-weight:700;margin-bottom:4px;}
  .modal p{font-size:13px;color:var(--sub);margin-bottom:22px;}

  .field{margin-bottom:14px;}
  .field label{font-size:12px;color:var(--sub);display:block;margin-bottom:5px;}
  .field input{
    width:100%;
    background:#111;
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 13px;
    font-size:14px;
    color:var(--text);
    font-family:inherit;
    outline:none;
    transition:border-color .2s;
  }
  .field input:focus{border-color:var(--orange);}

  .err{
    font-size:12px;color:#f87171;
    min-height:18px;margin-bottom:10px;
    display:flex;align-items:center;gap:5px;
  }

  .btn-login{
    width:100%;padding:12px;
    border-radius:10px;
    background:var(--orange);
    color:#fff;
    font-size:14px;font-weight:600;
    border:none;cursor:pointer;
    font-family:inherit;
    transition:opacity .15s,transform .1s;
  }
  .btn-login:hover{opacity:.9;}
  .btn-login:active{transform:scale(.98);}

  .btn-cancel{
    width:100%;padding:10px;
    border-radius:10px;
    background:transparent;
    color:var(--sub);
    font-size:13px;
    border:1px solid var(--border);
    cursor:pointer;
    font-family:inherit;
    margin-top:8px;
    transition:border-color .2s;
  }
  .btn-cancel:hover{border-color:rgba(255,255,255,.2);}

  .footer{
    text-align:center;
    margin-top:28px;
    font-size:11px;
    color:#444;
  }
</style>
</head>
<body>

<!-- Login Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>🔒 Acesso Supervisor</h2>
    <p>Digite suas credenciais para continuar</p>

    <div class="field">
      <label>Usuário</label>
      <input type="text" id="loginUser" placeholder="Usuário" autocomplete="username"/>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="loginPass" placeholder="••••••" autocomplete="current-password"/>
    </div>

    <div class="err" id="loginErr"></div>

    <button class="btn-login" onclick="tentarLogin()">Entrar →</button>
    <button class="btn-cancel" onclick="fecharLogin()">Cancelar</button>
  </div>
</div>

<script>
  const LOGIN_USER='BrunoBrolese';
  const LOGIN_PASS='123456';

  function abrirLogin(){
    document.getElementById('overlay').classList.add('open');
    setTimeout(()=>document.getElementById('loginUser').focus(),100);
  }

  function fecharLogin(){
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('loginErr').textContent='';
    document.getElementById('loginPass').value='';
  }

  function tentarLogin(){
    const u=document.getElementById('loginUser').value.trim();
    const p=document.getElementById('loginPass').value;
    const err=document.getElementById('loginErr');
    if(u===LOGIN_USER&&p===LOGIN_PASS){
      sessionStorage.setItem('sup_auth','1');
      window.location.href='supervisor.html';
    } else {
      err.textContent='⚠ Usuário ou senha incorretos.';
      document.getElementById('loginPass').value='';
      document.getElementById('loginPass').focus();
    }
  }

  document.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&document.getElementById('overlay').classList.contains('open')){
      tentarLogin();
    }
    if(e.key==='Escape'){fecharLogin();}
  });

  // fecha clicando fora do modal
  document.getElementById('overlay').addEventListener('click',function(e){
    if(e.target===this)fecharLogin();
  });
</script>
